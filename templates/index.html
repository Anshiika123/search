<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LinkedIn Topic Search</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<div class="container">
  <!-- Header -->
  <div class="header">
    <div class="logo">in</div>
    <div>
      <h1>LinkedIn Topic Search</h1>
      <p>Search any topic → Get Top 10 Posts</p>
    </div>
  </div>

  <!-- Search Form -->
  <div class="card">
    <div class="form-group">
      <label>🔍 Topic</label>
      <input type="text" id="topic" placeholder="e.g. AI in marketing, Python tips, startup funding..." />
    </div>

    <div class="credentials" id="credBox">
      <p class="cred-note">🔐 LinkedIn Login (only needed first time)</p>
      <div class="form-row">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="your@email.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="••••••••" />
        </div>
      </div>
    </div>

    <button class="btn-search" id="searchBtn" onclick="doSearch()">
      🔍 Search LinkedIn
    </button>
  </div>

  <!-- Status -->
  <div class="status" id="status" style="display:none"></div>

  <!-- Results -->
  <div id="results" style="display:none">
    <div class="results-header">
      <h2 id="resultsTitle"></h2>
      <button class="btn-export" onclick="exportExcel()">📊 Export to Excel</button>
    </div>
    <div id="postsList"></div>
  </div>
</div>

<script>
async function doSearch() {
  const topic = document.getElementById('topic').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();

  if (!topic) { alert('Please enter a topic!'); return; }

  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Searching... (browser will open)';

  showStatus('🌐 Opening LinkedIn browser... please wait (this takes 30-60 seconds)', 'loading');
  document.getElementById('results').style.display = 'none';

  try {
    const res = await fetch('/search', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ topic, email, password })
    });
    const data = await res.json();

    if (data.error) {
      showStatus('❌ ' + data.error, 'error');
    } else {
      showStatus(`✅ Found ${data.count} posts for "${data.topic}"`, 'success');
      renderResults(data);
    }
  } catch(e) {
    showStatus('❌ Something went wrong: ' + e.message, 'error');
  }

  btn.disabled = false;
  btn.textContent = '🔍 Search LinkedIn';
}

function renderResults(data) {
  document.getElementById('resultsTitle').textContent = `Top ${data.count} Posts — "${data.topic}"`;
  const list = document.getElementById('postsList');
  list.innerHTML = '';

  data.posts.forEach((post, i) => {
    list.innerHTML += `
      <div class="post-card">
        <div class="post-num">${i + 1}</div>
        <div class="post-body">
          <div class="post-author">
            ${post.profile_url
              ? `<a href="${post.profile_url}" target="_blank">👤 ${post.author_name}</a>`
              : `<span>👤 ${post.author_name}</span>`}
          </div>
          <div class="post-context">${post.context}</div>
          <div class="post-links">
            ${post.profile_url ? `<a href="${post.profile_url}" target="_blank">🔗 Profile</a>` : ''}
            ${post.post_url ? `<a href="${post.post_url}" target="_blank">📄 View Post</a>` : ''}
          </div>
        </div>
      </div>`;
  });

  document.getElementById('results').style.display = 'block';
}

function showStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + type;
  el.style.display = 'block';
}

function exportExcel() {
  window.location.href = '/export';
}

// Allow Enter key
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});
</script>
</body>
</html>

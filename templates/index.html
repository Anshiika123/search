<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkedIn Post Search</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="#0A66C2">
          <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
        </svg>
        LinkedIn Post Search
      </div>
      <p class="subtitle">Search any topic — get top 10 LinkedIn posts powered by Claude AI</p>
    </header>

    <div class="search-box">
      <input
        type="text"
        id="topicInput"
        placeholder="e.g. AI in healthcare, startup fundraising, remote work tips..."
        autocomplete="off"
      />
      <button id="searchBtn" onclick="doSearch()">
        <span id="btnText">Search</span>
        <span id="btnSpinner" class="spinner hidden"></span>
      </button>
    </div>

    <div id="refinedQuery" class="refined-query hidden">
      <span class="label">Claude refined your query to:</span>
      <span id="queryText"></span>
    </div>

    <div id="errorBox" class="error-box hidden"></div>

    <div id="results" class="results hidden">
      <div class="results-header">
        <h2>Top LinkedIn Posts</h2>
        <span id="resultsCount" class="count-badge"></span>
      </div>
      <div id="cardGrid"></div>
    </div>

    <div id="emptyState" class="empty-state hidden">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <p>No LinkedIn posts found. Try a different topic or broader keywords.</p>
    </div>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>

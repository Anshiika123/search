<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LinkedIn Search</title>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>

<div class="app">

  <!-- ── TOP BAR ── -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="logo">in</div>
      <span class="topbar-title">LinkedIn Search</span>
    </div>
    <div class="topbar-right">
      <div id="credsSaved" class="api-status ok" style="{% if not has_creds %}display:none{% endif %}">✅ SerpAPI connected</div>
      <div id="credsSetup" class="api-status warn" style="{% if has_creds %}display:none{% endif %}">⚠️ No API key</div>
      <a class="btn-linkedin" href="https://www.linkedin.com/feed/" target="_blank">
        <span class="btn-linkedin-logo">in</span> Open LinkedIn
      </a>
    </div>
  </div>

  <!-- ── API SETUP BANNER ── -->
  <div id="setupBanner" class="setup-banner" style="{% if has_creds %}display:none{% endif %}">
    <div class="setup-inner">
      <b>⚙️ Setup:</b>
      1. <a href="https://serpapi.com" target="_blank">Sign up at serpapi.com</a> (free) &nbsp;→&nbsp;
      2. Copy your API key and paste here:
      <input type="text" id="inputApiKey" class="setup-input" placeholder="SerpAPI key..." />
      <button class="btn-save" onclick="saveCreds()">Save</button>
    </div>
  </div>

  <!-- ── THREE-PANEL LAYOUT ── -->
  <div class="panels">

    <!-- PANEL 1: Sidebar / Filters -->
    <aside class="panel-filters">

      <div class="filter-block">
        <div class="filter-title">Search Mode</div>
        <button class="ftab active" data-mode="both"     onclick="setMode(this)">👤 Profiles + Posts</button>
        <button class="ftab"        data-mode="profiles" onclick="setMode(this)">👤 Profiles Only</button>
        <button class="ftab"        data-mode="posts"    onclick="setMode(this)">📄 Posts Only</button>
      </div>

      <div class="filter-block">
        <div class="filter-title">Region <span class="fhint">optional</span></div>
        <input type="text" id="regionCustom" class="filter-input"
               list="regionList" placeholder="e.g. Bangalore, NYC..." />
        <datalist id="regionList">
          <option value="Bangalore India"><option value="Delhi India">
          <option value="Mumbai India"><option value="Hyderabad India">
          <option value="Pune India"><option value="Chennai India">
          <option value="Noida India"><option value="Gurugram India">
          <option value="California USA"><option value="New York USA">
          <option value="San Francisco USA"><option value="Seattle USA">
          <option value="London UK"><option value="Toronto Canada">
          <option value="Sydney Australia"><option value="Singapore">
          <option value="Dubai UAE"><option value="Berlin Germany">
        </datalist>
      </div>

      <div class="filter-block">
        <div class="filter-title">Profile Status</div>
        <button class="ftab active" data-status="all"          onclick="setStatus(this)">🔍 All</button>
        <button class="ftab"        data-status="open_to_work" onclick="setStatus(this)">🟢 Open to Work</button>
        <button class="ftab"        data-status="working"      onclick="setStatus(this)">💼 Currently Working</button>
        <button class="ftab"        data-status="experienced"  onclick="setStatus(this)">⭐ Experienced 3+ yrs</button>
        <div class="filter-note">Based on Google snippet signals.</div>
      </div>

      <div class="filter-block">
        <div class="filter-title">Results Count</div>
        <select id="maxResults" class="filter-select">
          <option value="5" selected>Top 5</option>
          <option value="10">Top 10</option>
        </select>
      </div>

    </aside>

    <!-- PANEL 2: Search -->
    <section class="panel-search">
      <div class="search-label">Search LinkedIn</div>
      <input type="text" id="topic" class="search-input"
             placeholder="AI Python, data science, digital marketing..." />
      <button class="btn-search" id="searchBtn" onclick="doSearch()">Search</button>
      <div class="status" id="status" style="display:none"></div>
    </section>

    <!-- PANEL 3: Results -->
    <section class="panel-results" id="panel-results">
      <div class="results-empty" id="resultsEmpty">
        <div class="results-empty-icon">🔍</div>
        <div>Results will appear here</div>
      </div>
      <div id="resultsHeader" style="display:none">
        <div class="results-top">
          <div>
            <div class="results-title" id="resultsTitle"></div>
            <div class="results-sub"  id="resultsSubtitle"></div>
          </div>
          <button class="btn-export" onclick="exportExcel()">📊 Export</button>
        </div>
      </div>
      <div id="postsList"></div>
    </section>

  </div><!-- /panels -->
</div>

<script>
  let savedApiKey = localStorage.getItem('serpapi_key') || '';
  let currentMode = 'both';
  let currentStatus = 'all';

  async function saveCreds() {
    const ak = document.getElementById('inputApiKey').value.trim();
    if (!ak) { alert('Enter your SerpAPI key'); return; }
    const r = await fetch('/save_creds', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({api_key: ak})
    });
    const d = await r.json();
    if (d.ok) {
      localStorage.setItem('serpapi_key', ak);
      savedApiKey = ak;
      document.getElementById('setupBanner').style.display = 'none';
      document.getElementById('credsSetup').style.display = 'none';
      document.getElementById('credsSaved').style.display = 'block';
    } else { alert('Error: ' + d.error); }
  }

  function setMode(btn) {
    document.querySelectorAll('.ftab[data-mode]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = btn.dataset.mode;
  }

  function setStatus(btn) {
    document.querySelectorAll('.ftab[data-status]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentStatus = btn.dataset.status;
  }

  async function doSearch() {
    const topic = document.getElementById('topic').value.trim();
    if (!topic) { alert('Enter a topic first'); return; }

    const region     = document.getElementById('regionCustom').value.trim();
    const maxResults = parseInt(document.getElementById('maxResults').value);
    const btn        = document.getElementById('searchBtn');

    btn.disabled = true; btn.textContent = 'Searching...';
    showStatus(`Searching "${topic}"${region ? ' · ' + region : ''}...`, 'loading');
    document.getElementById('resultsEmpty').style.display   = 'none';
    document.getElementById('resultsHeader').style.display  = 'none';
    document.getElementById('postsList').innerHTML = '';

    try {
      const res = await fetch('/search', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          topic, max_results: maxResults, region,
          search_mode: currentMode, status_filter: currentStatus,
          api_key: savedApiKey || localStorage.getItem('serpapi_key') || '',
        })
      });
      const data = await res.json();
      if (data.error) {
        showStatus('❌ ' + data.error, 'error');
        document.getElementById('resultsEmpty').style.display = 'flex';
      } else {
        showStatus(`✅ Found ${data.count} result${data.count !== 1 ? 's' : ''}`, 'success');
        renderResults(data);
      }
    } catch(e) {
      showStatus('❌ ' + e.message, 'error');
    }

    btn.disabled = false; btn.textContent = 'Search';
  }

  function getInitials(name) {
    return name.split(' ').slice(0,2).map(w => w[0]||'').join('').toUpperCase() || '?';
  }
  function avatarColor(name) {
    const c = ['#0A66C2','#057642','#8B44AC','#C37D16','#CC1016','#2563eb'];
    let h = 0; for (let ch of name) h = (h*31 + ch.charCodeAt(0)) & 0xffff;
    return c[h % c.length];
  }

  function renderResults(data) {
    document.getElementById('resultsTitle').textContent = `${data.count} result${data.count!==1?'s':''} — "${data.topic}"`;
    document.getElementById('resultsSubtitle').textContent = data.region ? `📍 ${data.region}` : '';
    document.getElementById('resultsHeader').style.display = 'block';

    let posts = data.posts;
    if (currentStatus === 'open_to_work')
      posts = data.posts.filter(p => p.open_to_work).length ? data.posts.filter(p => p.open_to_work) : data.posts;
    else if (currentStatus === 'working')
      posts = data.posts.filter(p => p.current_company && !p.open_to_work).length ? data.posts.filter(p => p.current_company && !p.open_to_work) : data.posts;
    else if (currentStatus === 'experienced')
      posts = data.posts.filter(p => p.exp_years >= 3 || p.seniority_score >= 3).length ? data.posts.filter(p => p.exp_years >= 3 || p.seniority_score >= 3) : data.posts;

    const list = document.getElementById('postsList');
    list.innerHTML = '';

    posts.forEach((post, i) => {
      const bg  = avatarColor(post.author_name);
      const ini = getInitials(post.author_name);

      const badges = [
        post.result_type === 'profile' ? `<span class="badge b-profile">👤 Profile</span>` : `<span class="badge b-post">📄 Post</span>`,
        post.open_to_work    ? `<span class="badge b-otw">🟢 Open to Work</span>` : '',
        post.current_company ? `<span class="badge b-company">🏢 ${post.current_company}</span>` : '',
        post.exp_years > 0   ? `<span class="badge b-exp">📅 ${post.exp_years}+ yrs</span>` : '',
        post.seniority_score > 0 ? `<span class="badge b-sen">${'⭐'.repeat(Math.min(post.seniority_score,3))} L${post.seniority_score}</span>` : '',
        post.is_active       ? `<span class="badge b-active">⚡ Active</span>` : '',
        (data.region && post.region_match) ? `<span class="badge b-region">📍 ${data.region}</span>` : '',
        post.matched_keywords > 0 ? `<span class="badge b-kw">${post.matched_keywords}/${post.total_keywords} kw</span>` : '',
      ].join('');

      const jobLine = post.job_title ? `<div class="card-jobtitle">💼 ${post.job_title}</div>` : '';
      const btnLabel = post.post_url_label || '📄 Open Post';
      const claudeQ  = encodeURIComponent(post.result_type === 'profile'
        ? `LinkedIn profile: ${post.author_name}\nTitle: ${post.job_title||''}\nCompany: ${post.current_company||''}\nProfile: ${post.profile_url}`
        : `LinkedIn post by ${post.author_name}:\n${post.context}\nURL: ${post.post_url}`);

      list.innerHTML += `
        <div class="result-card ${post.result_type === 'profile' ? 'card-profile' : ''}">
          <div class="card-banner"></div>
          <div class="card-body">
            <div class="card-avatar" style="background:${bg}">${ini}</div>
            <div class="card-num">${i+1}</div>
            <div class="card-info">
              <div class="card-name">
                ${post.profile_url ? `<a href="${post.profile_url}" target="_blank">${post.author_name}</a>` : post.author_name}
              </div>
              ${jobLine}
              <div class="card-badges">${badges}</div>
              <div class="card-context">${post.context}</div>
              <div class="card-actions">
                ${post.profile_url ? `<a class="cbtn cbtn-outline" href="${post.profile_url}" target="_blank">👤 Profile</a>` : ''}
                ${post.post_url    ? `<a class="cbtn cbtn-fill"    href="${post.post_url}"    target="_blank">${btnLabel}</a>` : ''}
                <a class="cbtn cbtn-claude" href="https://claude.ai/new?q=${claudeQ}" target="_blank">✨ Ask Claude</a>
              </div>
            </div>
          </div>
        </div>`;
    });
  }

  function showStatus(msg, type) {
    const el = document.getElementById('status');
    el.textContent = msg; el.className = 'status ' + type; el.style.display = 'block';
  }

  function exportExcel() { window.location.href = '/export'; }
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
</script>
</body>
</html>
